name: Build e Deploy para KingHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instala dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Instala lftp
        run: sudo apt-get install -y lftp

      - name: Debug caminhos FTP
        run: |
          lftp -d -e "
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set net:timeout 10;
            set net:max-retries 1;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            echo '--- Listando Raiz Absoluta (/) ---';
            ls -la / || echo 'Não foi possível listar /';
            echo '--- Listando . (Atual) ---';
            ls -la . ;
            echo '--- Tentando subir um nível ---';
            cd .. && pwd && ls -la && cd - || echo 'Não foi possível subir';
            echo '--- Listando caminhos comuns (Absoluto) ---';
            ls -la /www || echo '/www não existe';
            ls -la /public_html || echo '/public_html não existe';
            ls -la /Www || echo '/Www não existe';
            echo '--- Busca Recursiva (Pode falhar se houver muitos arquivos) ---';
            ls -R || echo 'LS recursivo falhou';
            quit
          " 2>&1 || true
