name: Build e Deploy para KingHost

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instala dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Deploy para branch production
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          echo "Prepando os arquivos no diretório dist..."
          cd dist
          
          echo "Conteúdo de dist antes do deploy:"
          ls -R
          
          echo "Inicializando repositório temporário para o branch production..."
          git init
          git add -A
          git commit -m "deploy: atualizando produção [skip ci]"
          git branch -M production
          
          echo "Enviando para o branch production do GitHub..."
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin production
          
          echo "Deploy concluído com sucesso!"
