name: Build e Deploy para KingHost

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instala dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Deploy para branch production
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          cd dist
          echo "Conteúdo da pasta dist antes do commit:"
          ls -la
          git init
          git add -A
          git commit -m "deploy"
          git branch -M production
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ItalloAquino/p-scoa-lucrativa-receitas-e-lucros.git
          git push -f origin production
