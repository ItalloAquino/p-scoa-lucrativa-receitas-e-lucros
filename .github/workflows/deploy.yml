name: Build e Deploy para KingHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instala dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Instala lftp
        run: sudo apt-get install -y lftp

      - name: Debug caminhos FTP
        run: |
          lftp -d -e "
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set net:timeout 10;
            set net:max-retries 1;
            set net:reconnect-interval-multiplier 1;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            pwd;
            echo '--- Raiz ---';
            ls -la;
            echo '--- Tentando www ---';
            cd www && ls -la && cd .. || echo 'www não acessível';
            echo '--- Tentando Www ---';
            cd Www && ls -la && cd .. || echo 'Www não acessível';
            echo '--- Tentando public_html ---';
            cd public_html && ls -la && cd .. || echo 'public_html não acessível';
            quit
          " 2>&1 || true
