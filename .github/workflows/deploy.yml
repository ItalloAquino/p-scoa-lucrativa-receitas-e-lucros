name: Build e Deploy para KingHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instala dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Instala lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set ftp:list-options -a;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            echo '--- Listando Root (/) ---';
            ls -la / || echo 'Falha ao listar /';
            echo '--- Listando Atual (.) ---';
            ls -la . || echo 'Falha ao listar .';
            echo '--- Tentando Mirror para /www ---';
            mirror -R --delete --verbose ./dist/ /www || echo 'Mirror para /www falhou';
            echo '--- Tentando Mirror para www (relativo) ---';
            mirror -R --delete --verbose ./dist/ www || echo 'Mirror para www falhou';
            quit
          " 2>&1 || true
